changelog:
  exclude:
    labels:
      - status:invalid
      - status:duplicate
      - status:wontfix
      - status:blocked
  categories:
    # Security first — high visibility for any release with sec fixes.
    - title: 🚨 Security
      labels:
        - type:security

    # Community next — celebrate external contributions even if they're
    # also tagged with a type:* or domain:* label (first-match-wins).
    - title: 🌱 Community Contributions
      labels:
        - community-pr

    # Sync PRs above domain categories. Cherry-pick PRs typically touch
    # every service path so the labeler stamps them with every domain:*
    # label — first-match-wins routes them here instead of polluting
    # individual area sections.
    - title: 🔄 Cherry-picked from EE
      labels:
        - sync

    # ── Domain categories (business-area axis) ───────────────────────────
    - title: 🏕 K8s
      labels:
        - domain:k8s
    - title: 🏕 Cloud
      labels:
        - domain:cloud
    - title: 🏕 AI / LLM
      labels:
        - domain:llm
        - domain:agent
    - title: 🏕 Automation / Workflow
      labels:
        - domain:automation
    - title: 🏕 Notifications
      labels:
        - domain:notifications
    - title: 🏕 Tickets
      labels:
        - domain:tickets
    - title: 🏕 Auth
      labels:
        - domain:auth
    - title: 🏕 FinOps
      labels:
        - domain:finops
    - title: 🏕 Troubleshooting
      labels:
        - domain:troubleshooting
    - title: 🏕 UI
      labels:
        - domain:ui

    # ── Type-based fallback (only fires when no domain:* label landed) ──
    - title: ✨ Features
      labels:
        - type:feature
    - title: 🐛 Bug Fixes
      labels:
        - type:bug
    - title: 🚀 Performance
      labels:
        - type:performance
    - title: 📚 Documentation
      labels:
        - type:docs
    - title: 🔧 Refactoring
      labels:
        - type:refactor

    # ── Catchall — anything not categorized still shows up ──────────────
    - title: 📝 Other Changes
      labels:
        - "*"
